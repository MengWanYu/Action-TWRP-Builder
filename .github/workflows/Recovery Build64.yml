name:  Recovery 构建（arm64/Readboy G60 最终版）
on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: '清单URL'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni'
      MANIFEST_BRANCH:
        description: '清单分支（强制twrp-6.0）'
        required: true
        default: 'twrp-6.0'
      DEVICE_TREE_URL:
        description: '设备树URL'
        required: true
        default: 'https://github.com/MengWanYu/android_device_Allwinner_READBOY'
      DEVICE_TREE_BRANCH:
        description: '设备树分支'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: '设备树路径'
        required: true
        default: 'device/Allwinner/READBOY'
      COMMON_TREE_URL:
        description: '通用树URL（无则留空）'
        required: false
        default: ''
      COMMON_TREE_BRANCH:
        description: '通用树分支'
        required: false
        default: ''
      COMMON_PATH:
        description: '通用树路径'
        required: false
        default: ''
      DEVICE_NAME:
        description: '设备名称'
        required: true
        default: 'READBOY'
      MAKEFILE_NAME:
        description: 'Makefile名称'
        required: true
        default: 'omni_READBOY'
      BUILD_TARGET:
        description: '构建目标'
        required: true
        default: 'recovery'
jobs:
  build:
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - name: 显示运行参数
      run: |
        echo "::group::用户环境变量"
        echo "清单分支：${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "设备树：${{ github.event.inputs.DEVICE_TREE_URL }}"
        echo "架构：arm64-v8a"
        echo "::endgroup::"
    - name: 检出代码
      uses: actions/checkout@v4
    - name: 清理环境
      uses: rokibhasansagar/slimhub_actions@main
    - name: 准备构建环境（修复包名+移除无效挂载）
      run: |
        sudo apt update && sudo apt upgrade -y
        # 移除无效的根目录重新挂载（Ubuntu 24.04默认已大小写敏感）
        # 纠正arm64依赖：Ubuntu无clang-aarch64-linux-gnu，用clang+llvm+交叉编译gcc即可
        DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            linux-modules-extra-$(uname -r) \
            gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu clang llvm \  # 正确arm64依赖
            libc6-dev lib32ncurses-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils \
            xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev \
            build-essential libgtk-3-dev libglu1-mesa-dev freeglut3-dev git libxml2 lzop pngcrush schedtool squashfs-tools \
            imagemagick libbz2-dev lzma ncftp qemu-user-static libstdc++-10-dev libncurses6 python3 tar || true
    - name: 安装 OpenJDK 8
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '8'
    - name: 配置SSH密钥
      if: ${{ startsWith(github.event.inputs.MANIFEST_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: |
          ${{ secrets.SSH_PRIVATE_KEY }}
    - name: 安装 repo 工具
      run: |
        mkdir -p ~/bin
        curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo
    - name: 初始化 repo
      id: pwd
      run: |
        set -e
        mkdir -p workspace && cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
        git config --global user.name "Nico170420"
        git config --global user.email "b170420nc@gmail.com"
        if ! git ls-remote --exit-code --heads "${{ github.event.inputs.MANIFEST_URL }}" "twrp-6.0" >/dev/null 2>&1; then
          echo "错误：twrp-6.0分支不存在"
          exit 1
        fi
        repo init --depth=1 -u "${{ github.event.inputs.MANIFEST_URL }}" -b twrp-6.0
    - name: 同步源码
      run: |
        cd "${{ steps.pwd.outputs.workspace-folder }}"
        repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle --timeout=120 || {
          repo sync -j1 --force-sync --no-tags --no-clone-bundle --timeout=180
        }
    - name: 克隆设备树
      run: |
        cd "${{ steps.pwd.outputs.workspace-folder }}"
        mkdir -p $(dirname "./${{ github.event.inputs.DEVICE_PATH }}")
        git clone "${{ github.event.inputs.DEVICE_TREE_URL }}" -b "${{ github.event.inputs.DEVICE_TREE_BRANCH }}" "./${{ github.event.inputs.DEVICE_PATH }}" || {
          echo "设备树克隆失败"
          exit 1
        }
    - name: 修复arm64 clang配置文件（关键）
      run: |
        cd "${{ steps.pwd.outputs.workspace-folder }}"
        CLANG_CONFIG="build/core/clang/TARGET_arm64-v8a.mk"
        mkdir -p $(dirname "${CLANG_CONFIG}")
        # 写入完整的arm64 clang配置，适配twrp-6.0
        cat > "${CLANG_CONFIG}" << EOF
        # TWRP 6.0 arm64 clang配置（解决缺失问题）
        CLANG_TARGET_ARCH := arm64
        CLANG_TARGET_CPU := generic
        CLANG_TARGET_ABI := aarch64-linux-android
        CLANG_FLAGS := -target aarch64-linux-android -march=armv8-a -fPIC
        CLANG_CFLAGS := \$(CLANG_FLAGS)
        CLANG_CXXFLAGS := \$(CLANG_FLAGS)
        CC := clang
        CXX := clang++
        LD := aarch64-linux-gnu-ld
        AR := aarch64-linux-gnu-ar
        RANLIB := aarch64-linux-gnu-ranlib
        EOF
    - name: 强制设备树arm64配置
      run: |
        cd "${{ steps.pwd.outputs.workspace-folder }}"
        CONFIG="${{ github.event.inputs.DEVICE_PATH }}/BoardConfig.mk"
        # 覆盖设备树架构配置，确保是arm64
        sed -i '/^TARGET_ARCH=/d' "${CONFIG}"
        sed -i '/^TARGET_CPU_ABI=/d' "${CONFIG}"
        sed -i '/^TARGET_ARCH_VARIANT=/d' "${CONFIG}"
        sed -i '/^CC=/d' "${CONFIG}"
        sed -i '/^CXX=/d' "${CONFIG}"
        echo "TARGET_ARCH := arm64-v8a" >> "${CONFIG}"
        echo "TARGET_CPU_ABI := arm64-v8a" >> "${CONFIG}"
        echo "TARGET_ARCH_VARIANT := generic" >> "${CONFIG}"
        echo "TARGET_CPU_VARIANT := generic" >> "${CONFIG}"
    - name: 克隆通用树（可选）
      if: ${{ github.event.inputs.COMMON_TREE_URL != '' }}
      run: |
        cd "${{ steps.pwd.outputs.workspace-folder }}"
        git clone "${{ github.event.inputs.COMMON_TREE_URL }}" -b "${{ github.event.inputs.COMMON_TREE_BRANCH }}" "./${{ github.event.inputs.COMMON_PATH }}" || true
    - name: 设置交换空间
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 16
    - name: 构建 Recovery（修复所有Python+编译错误）
      run: |
        set -e
        cd "${{ steps.pwd.outputs.workspace-folder }}"
        # 修复1：Python 3 filter无len()错误
        sed -i 's/len(matches)/len(list(matches))/g' build/tools/roomservice.py
        # 修复2：Python 2 print语法
        sed -i 's/print r/print(r)/g' build/tools/findleaves.py
        # 修复3：Python 2 异常语法
        sed -i 's/except IOError, ES.ParseError:/except (IOError, ES.ParseError):/g' build/tools/roomservice.py
        # 修复4：可能存在的其他Python 2语法（dict.iteritems()）
        sed -i 's/iteritems()/items()/g' build/tools/roomservice.py 2>/dev/null || true

        # 配置环境变量
        export OUT_DIR="${{ steps.pwd.outputs.workspace-folder }}/out"
        export FORCE_CASE_SENSITIVE=1
        export TARGET_SCREEN_WIDTH=800
        export TARGET_SCREEN_HEIGHT=1280
        export ALLOW_MISSING_DEPENDENCIES=true
        # 绑定arm64工具链
        export CC=clang
        export CXX=clang++
        export LD=aarch64-linux-gnu-ld
        export AR=aarch64-linux-gnu-ar

        # 加载环境+注册产品
        source build/envsetup.sh
        [ -f "${{ github.event.inputs.DEVICE_PATH }}/vendorsetup.sh" ] && source "${{ github.event.inputs.DEVICE_PATH }}/vendorsetup.sh" || add_lunch_combo "omni_READBOY-eng"

        # 自动选择产品
        echo "9" | lunch "omni_READBOY-eng" || echo "9" | lunch

        # 构建
        make clean || true
        echo "启动arm64 recovery.img构建"
        make "${{ github.event.inputs.BUILD_TARGET }}image" -j$(nproc --all) || {
          echo "构建失败，输出最后100行日志"
          tail -n 100 out/build.log
          exit 1
        }
    - name: 上传产物
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ steps.pwd.outputs.workspace-folder }}/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
        name: Readboy G60-arm64-TWRP-${{ github.run_id }}
        tag_name: G60-arm64-${{ github.run_id }}
        body: |
          适配设备：Readboy G60（800×1280）
          架构：arm64-v8a
          清单分支：twrp-6.0
          修复内容：包找不到、clang配置缺失、Python语法错误
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
