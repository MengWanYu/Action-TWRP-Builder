name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'MANIFEST_URL (if want to use SSH keys, use git@github.com:XXXXX)'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: 'twrp-12.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/TeamWin/android_device_asus_I003D'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'android-12.1'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/asus/I003D'
      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL (if no common tree, leave blank)'
        required: false
      COMMON_PATH:
        description: 'COMMON_PATH (if no common tree, leave blank)'
        required: false
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'I003D'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_I003D'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'recovery'

jobs:
  build:
    # 保留原逻辑：只允许仓库所有者触发
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - name: Display Run Parameters
      run: |
        echo "::group::User Environment Variables"
        echo "Manifest URL: ${{ github.event.inputs.MANIFEST_URL }}"
        echo "Manifest Branch: ${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "Device Tree URL: ${{ github.event.inputs.DEVICE_TREE_URL }}"
        echo "Device Tree Branch: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
        echo "Device Path: ${{ github.event.inputs.DEVICE_PATH }}"
        echo "Device Name: ${{ github.event.inputs.DEVICE_NAME }}"
        echo "Makefile Name: ${{ github.event.inputs.MAKEFILE_NAME }}"
        echo "Build Target: ${{ github.event.inputs.BUILD_TARGET }}.img"
        echo "::endgroup::"

    - name: Check Out
      uses: actions/checkout@v4

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Prepare the environment
      run: |
        sudo apt update && sudo apt upgrade -y
        DEBIAN_FRONTEND=noninteractive sudo apt install -yq \
            linux-modules-extra-$(uname -r) \
            gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
            libc6-dev lib32ncurses-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils \
            xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev \
            build-essential libgtk-3-dev libglu1-mesa-dev freeglut3-dev git libxml2 lzop pngcrush schedtool squashfs-tools \
            imagemagick libbz2-dev lzma ncftp qemu-user-static libstdc++-10-dev libncurses6 python3 tar || true

    - name: Install OpenJDK 8 (for Android 5.1 compatibility)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '8'

    - name: Show Java Version
      run: java -version

    - name: Setup SSH Keys
      if: ${{ startsWith(github.event.inputs.MANIFEST_URL, 'git@github.com') || startsWith(github.event.inputs.DEVICE_TREE_URL, 'git@github.com') || startsWith(github.event.inputs.COMMON_TREE_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: |
          ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Install repo
      run: |
        mkdir -p ~/bin
        curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo
        repo --version || true

    - name: "Initialize repo (robust — 检查 manifest 分支是否存在并回退)"
      id: pwd
      run: |
        set -e
        mkdir workspace
        cd workspace
        # 输出 workspace 路径供后续步骤使用
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT

        git config --global user.name "Nico170420"
        git config --global user.email "b170420nc@gmail.com"

        MANIFEST_URL="${{ github.event.inputs.MANIFEST_URL }}"
        MANIFEST_BRANCH="${{ github.event.inputs.MANIFEST_BRANCH }}"

        echo "尝试验证 manifest 分支 '${MANIFEST_BRANCH}' 在 ${MANIFEST_URL} 是否存在..."

        # 使用 git ls-remote 检查远端是否存在该分支
        if git ls-remote --exit-code --heads "${MANIFEST_URL}" "refs/heads/${MANIFEST_BRANCH}" >/dev/null 2>&1; then
          echo "发现分支 '${MANIFEST_BRANCH}'，使用该分支初始化 repo..."
          repo init --depth=1 -u "${MANIFEST_URL}" -b "${MANIFEST_BRANCH}"
        else
          echo "警告：远端未找到分支 '${MANIFEST_BRANCH}'，列出远端可用分支以便诊断："
          git ls-remote --heads "${MANIFEST_URL}" || true
          echo "尝试回退：使用 repo init 的默认分支（不带 -b）..."
          if repo init --depth=1 -u "${MANIFEST_URL}"; then
            echo "repo init 使用默认分支成功（回退）。"
          else
            echo "错误：无法使用指定分支或默认分支初始化 manifest 仓库。请确认 MANIFEST_URL 和 MANIFEST_BRANCH 是否正确。"
            exit 1
          fi
        fi

    - name: Repo Sync
      run: |
        set -e
        cd workspace
        # 首次 sync 用较高并行度，失败则降并行重试
        if repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle; then
          echo "repo sync 成功"
        else
          echo "repo sync 第一轮失败，尝试降并行度重试"
          repo sync -j1 --force-sync --no-tags --no-clone-bundle || true
        fi
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone device tree
      run: |
        set -e
        echo "克隆设备树：${{ github.event.inputs.DEVICE_TREE_URL }} @ ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
        git clone "${{ github.event.inputs.DEVICE_TREE_URL }}" -b "${{ github.event.inputs.DEVICE_TREE_BRANCH }}" "./${{ github.event.inputs.DEVICE_PATH }}" || {
          echo "错误：克隆设备树失败（请检查 URL / 分支）。"
          exit 1
        }
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone common tree
      if: ${{ github.event.inputs.COMMON_TREE_URL != '' && github.event.inputs.COMMON_PATH != '' }}
      run: |
        set -e
        git clone "${{ github.event.inputs.COMMON_TREE_URL }}" -b "${{ github.event.inputs.DEVICE_TREE_BRANCH }}" "./${{ github.event.inputs.COMMON_PATH }}" || {
          echo "警告：克隆 common tree 失败（若无 common tree 可忽略）"
        }
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Check Build Tree
      uses: haya14busa/action-cond@v1
      id: buildtree
      with:
        cond: ${{ github.event.inputs.MANIFEST_BRANCH == 'twrp-11' || github.event.inputs.MANIFEST_BRANCH == 'twrp-12.1' }}
        if_true: twrp
        if_false: omni

    - name: Sync Device Dependencies
      run: |
        set -e
        cd workspace
        if [ -f "${GITHUB_WORKSPACE}/scripts/convert.sh" ]; then
          bash ${GITHUB_WORKSPACE}/scripts/convert.sh "${{ github.event.inputs.DEVICE_PATH }}/${{ steps.buildtree.outputs.value }}.dependencies" || echo "convert.sh 返回非0"
        else
          echo "警告：scripts/convert.sh 未找到，跳过依赖转换"
        fi
        repo sync -j$(nproc --all) || repo sync -j1 || true
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      continue-on-error: true

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Building recovery
      run: |
        set -e
        cd workspace
        if [ -f build/envsetup.sh ]; then
          echo "找到 build/envsetup.sh，开始构建流程"
          source build/envsetup.sh
        else
          echo "错误：未找到 build/envsetup.sh — 可能 manifest 不包含预期的源码树或分支"
          exit 1
        fi

        export ALLOW_MISSING_DEPENDENCIES=true

        echo "运行 lunch：${{ github.event.inputs.MAKEFILE_NAME }}-eng"
        if lunch "${{ github.event.inputs.MAKEFILE_NAME }}-eng"; then
          echo "lunch 成功"
        else
          echo "警告：lunch 失败，继续尝试构建（但构建很可能随之失败）"
        fi

        make clean || true
        make "${{ github.event.inputs.BUILD_TARGET }}image" -j$(nproc --all) || { echo "构建失败，请检查日志"; exit 1; }
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
        with:
        files: |
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/${{ github.event.inputs.BUILD_TARGET }}.img
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.zip
          workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*vendor*.img
        name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device: ${{ github.event.inputs.DEVICE_NAME }}
          Target: ${{ github.event.inputs.BUILD_TARGET }}.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}%
